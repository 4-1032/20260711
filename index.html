<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Illustration Studio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:
    "Segoe UI",
    sans-serif;

    background:#f3f4f6;

    min-height:100vh;
}

header{

    background:#1f2937;

    color:white;

    padding:16px 24px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

header h1{

    font-size:24px;

}

#createProjectBtn{

    background:#3b82f6;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    font-size:15px;

}

#createProjectBtn:hover{

    background:#2563eb;

}

main{

    padding:24px;

}

#emptyState{

    text-align:center;

    margin-top:80px;

    color:#666;

    font-size:18px;

}

.gallery{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fill,
        minmax(
            280px,
            1fr
        )
    );

    gap:20px;

}

.projectCard{

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:
    0 2px 10px
    rgba(
        0,
        0,
        0,
        .08
    );

}

.projectThumbnail{

    width:100%;

    height:180px;

    object-fit:cover;

    background:#ddd;

}

.projectInfo{

    padding:12px;

}

.projectTitle{

    font-size:18px;

    font-weight:bold;

    margin-bottom:8px;

}

.projectDate{

    font-size:12px;

    color:#666;

    margin-bottom:12px;

}

.projectActions{

    display:flex;

    gap:8px;

}

.projectActions button{

    flex:1;

    border:none;

    padding:8px;

    cursor:pointer;

    border-radius:6px;

}

.editBtn{

    background:#3b82f6;

    color:white;

}

.copyBtn{

    background:#10b981;

    color:white;

}

.deleteBtn{

    background:#ef4444;

    color:white;

}

</style>

</head>

<body>

<header>

<h1>
Illustration Studio
</h1>

<button
id="createProjectBtn">

＋ 新規作品

</button>

</header>

<main>

<div
id="emptyState">

作品がありません。
右上の「新規作品」を押してください。

</div>

<div
id="gallery"
class="gallery">

</div>

</main>

<script src="db.js"></script>

<script src="js/gallery.js"></script>

</body>

</html>
